id: anthropic
order: 5
name: Anthropic
short_description: "Verified Claude Opus 4.6 via Anthropic official channel — pay per request with USDC"
short_description_zh: "通过 Anthropic 官方渠道接入的已验证 Claude Opus 4.6 — 用 USDC 按次付费"
