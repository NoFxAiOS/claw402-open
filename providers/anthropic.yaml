id: anthropic
name: Anthropic
short_description: "Claude Sonnet, Haiku and more — pay per request with USDC"
short_description_zh: "Claude Sonnet、Haiku 等模型 — 用 USDC 按次付费"
full_description: "Access Anthropic's Claude models without an account or API key. Pay per request with USDC via x402. Ideal for AI agents needing autonomous access to Claude's reasoning capabilities."
full_description_zh: "无需注册 Anthropic 账号或 API Key，直接用 USDC 按次调用 Claude 模型。非常适合需要自主推理能力的 AI Agent。"
website: https://anthropic.com
logo_url: /providers/anthropic.svg
category: ai
tags: [ai, llm, claude, chat, reasoning, agents]
featured: true

upstream_base_url: https://api.anthropic.com
upstream_type: api_key
upstream_auth_env: ANTHROPIC_API_KEY
upstream_auth_header: x-api-key

routes:
  # ── Messages (Chat) ──
  - gateway_path: /api/v1/ai/anthropic/messages
    upstream_path: /v1/messages
    method: POST
    category: Chat
    user_price: "0.01"
    upstream_cost: "0.004"
    description: "Claude Sonnet 对话"
    description_en: "Messages API with Claude Sonnet (default)"
    mime_type: application/json

  - gateway_path: /api/v1/ai/anthropic/messages/haiku
    upstream_path: /v1/messages
    method: POST
    category: Chat
    user_price: "0.003"
    upstream_cost: "0.001"
    description: "Claude Haiku 对话（更快更便宜）"
    description_en: "Messages API with Claude Haiku (faster, cheaper)"
    mime_type: application/json

  - gateway_path: /api/v1/ai/anthropic/messages/opus
    upstream_path: /v1/messages
    method: POST
    category: Chat
    user_price: "0.05"
    upstream_cost: "0.02"
    description: "Claude Opus 对话（最强推理能力）"
    description_en: "Messages API with Claude Opus (strongest reasoning)"
    mime_type: application/json
