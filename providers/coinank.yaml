id: coinank
name: CoinAnk
order: 1
short_description: "Professional crypto derivatives & on-chain data"
short_description_zh: "专业加密货币衍生品与链上数据"
full_description: "CoinAnk provides comprehensive crypto market data including open interest, funding rates, liquidation data, order book analytics, and more across major exchanges."
full_description_zh: "CoinAnk 提供全面的加密货币市场数据，包括持仓量、资金费率、爆仓数据、订单簿分析等，覆盖各大主流交易所。"
website: https://coinank.com
logo_url: /providers/coinank.svg
category: crypto
tags: [derivatives, on-chain, defi, market-data, exchanges]
featured: true

upstream_base_url: https://open-api.coinank.com
upstream_type: api_key
upstream_auth_env: COINANK_API_KEY
upstream_auth_header: apikey

routes:
  # ── 1. K-Line (VIP1) ──
  - gateway_path: /api/v1/coinank/kline/lists
    upstream_path: /api/kline/lists
    category: K-Line
    user_price: "0.00001"
    upstream_cost: "0.008"
    description: "K线行情数据（SWAP/SPOT，支持多交易所）"
    description_en: "Candlestick data (SWAP/SPOT, multi-exchange)"
    allowed_params: [symbol, exchange, endTime, size, interval, productType]

  # ── 2. ETF (VIP1) ──
